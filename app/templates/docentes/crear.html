{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm border-0">

    <div class="card-body p-4">

        <div class="mb-4">

            <h2 class="page-title">
                Registrar Docente
            </h2>

            <p class="text-muted">
                Registro pedagógico institucional.
            </p>

        </div>

        <form method="POST">

            <div class="row">

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Código
                    </label>

                    <input
                        type="text"
                        name="codigo"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Nombres
                    </label>

                    <input
                        type="text"
                        name="nombres"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Apellidos
                    </label>

                    <input
                        type="text"
                        name="apellidos"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-3 mb-3">

                    <label class="form-label">
                        Especialidad
                    </label>

                    <input
                        type="text"
                        name="especialidad"
                        class="form-control"
                        value="Matemática"
                        required>

                </div>

            </div>

            <div class="mt-4">

                <button class="btn btn-primary">

                    Guardar Docente

                </button>

                <a href="{{ url_for('docentes.listar') }}"
                   class="btn btn-secondary">

                    Volver

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
