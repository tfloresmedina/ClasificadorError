{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm border-0">

    <div class="card-body p-4">

        <div class="mb-4">

            <h2 class="page-title">
                Registrar Estudiante
            </h2>

            <p class="text-muted">
                Registro académico institucional.
            </p>

        </div>

        <form method="POST">

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Código
                    </label>

                    <input
                        type="text"
                        name="codigo"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Nombres
                    </label>

                    <input
                        type="text"
                        name="nombres"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Apellidos
                    </label>

                    <input
                        type="text"
                        name="apellidos"
                        class="form-control"
                        required>

                </div>

            </div>


            <div class="row">

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Fecha de nacimiento
                    </label>

                    <input
                        type="date"
                        name="fecha_nacimiento"
                        class="form-control">

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Grado
                    </label>

                    <select
                        name="grado_id"
                        class="form-select"
                        required>

                        <option value="">
                            Seleccione
                        </option>

                        {% for grado in grados %}

                            <option value="{{ grado.id }}">

                                {{ grado.nombre }}

                            </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-4 mb-3">

                    <label class="form-label">
                        Sección
                    </label>

                    <select
                        name="seccion_id"
                        class="form-select"
                        required>

                        <option value="">
                            Seleccione
                        </option>

                        {% for seccion in secciones %}

                            <option value="{{ seccion.id }}">

                                {{ seccion.nombre }}

                            </option>

                        {% endfor %}

                    </select>

                </div>

            </div>

            <div class="mt-4">

                <button class="btn btn-primary">

                    Guardar Estudiante

                </button>

                <a href="{{ url_for('estudiantes.listar') }}"
                   class="btn btn-secondary">

                    Volver

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
