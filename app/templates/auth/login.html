<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Login | I.E Elvira García Y García

    </title>


    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >


    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >


    <style>


        body {

            background:

                linear-gradient(
                    135deg,
                    #2563eb,
                    #1e293b
                );

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;
        }


        .login-card {

            width: 100%;

            max-width: 430px;

            border-radius: 20px;

            overflow: hidden;
        }


        .logo-title {

            font-weight: 800;

            color: #2563eb;
        }


    </style>

</head>

<body>


<div class="card shadow-lg border-0 login-card">


    <div class="card-body p-5">


        <!-- ========================================= -->
        <!-- HEADER -->
        <!-- ========================================= -->

        <div class="text-center mb-5">


            <i
                class="bi bi-cpu"
                style="
                    font-size: 4rem;
                    color: #2563eb;
                "
            ></i>


            <h1 class="logo-title mt-3">

                I.E Elvira García y García

            </h1>


            <p class="text-muted">

                Sistema Inteligente de Análisis
                Matemático

            </p>


        </div>


        <!-- ========================================= -->
        <!-- ALERTAS -->
        <!-- ========================================= -->

        {% with messages = get_flashed_messages(with_categories=true) %}

            {% if messages %}

                {% for category, message in messages %}

                    <div class="alert alert-{{ category }}">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}


        <!-- ========================================= -->
        <!-- FORM -->
        <!-- ========================================= -->

        <form method="POST">


            <!-- USER -->

            <div class="mb-4">


                <label class="form-label fw-bold">

                    Usuario

                </label>


                <div class="input-group">


                    <span class="input-group-text">

                        <i class="bi bi-person"></i>

                    </span>


                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required
                    >


                </div>


            </div>


            <!-- PASSWORD -->

            <div class="mb-4">


                <label class="form-label fw-bold">

                    Contraseña

                </label>


                <div class="input-group">


                    <span class="input-group-text">

                        <i class="bi bi-lock"></i>

                    </span>


                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required
                    >


                </div>


            </div>


            <!-- BTN -->

            <button
                type="submit"
                class="btn btn-primary w-100 py-2 fw-bold"
            >

                <i class="bi bi-box-arrow-in-right"></i>

                Ingresar al Sistema

            </button>


        </form>


    </div>


</div>


</body>

</html>
